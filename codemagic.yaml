workflows:
  tvos-testflight:
    name: StreamVault tvOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: Codemagic Key

    environment:
      xcode: latest
      groups:
        - signing
      vars:
        BUNDLE_ID: "com.murat.streamvault.tv"
        XCODE_PROJECT: "StreamVaultTV.xcodeproj"
        XCODE_SCHEME: "StreamVaultTV"
        APP_STORE_APPLE_ID: 6777746035

    scripts:
      - name: Install XcodeGen and generate project
        script: |
          brew install xcodegen
          echo "=== version (manual, from project.yml) ==="
          grep -E "MARKETING_VERSION|CURRENT_PROJECT_VERSION" project.yml
          xcodegen generate

      - name: Set up tvOS code signing
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type TVOS_APP_STORE \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build tvOS app (.ipa)
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
