workflows:
  tvos-testflight:
    name: StreamVault tvOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: Codemagic Key   # <-- çalışan anahtar adınla aynı yap

    environment:
      xcode: latest
      vars:
        BUNDLE_ID: "com.murat.streamvault.tv"
        XCODE_PROJECT: "StreamVaultTV.xcodeproj"
        XCODE_SCHEME: "StreamVaultTV"
        APP_STORE_APPLE_ID: 6777746035   # <-- gerçek sayısal Apple ID

    scripts:
      - name: Install XcodeGen and generate the Xcode project
        script: |
          brew install xcodegen
          export BUILD_NUMBER
          xcodegen generate

      - name: Set up tvOS code signing
        script: |
          set -e
          keychain initialize
          echo "===== fetch-signing-files ====="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type TVOS_APP_STORE \
            --create
          echo "===== add-certificates ====="
          keychain add-certificates
          echo "===== use-profiles ====="
          xcode-project use-profiles
          echo "===== installed profiles ====="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || true
          echo "===== signing settings in project ====="
          xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -showBuildSettings 2>/dev/null | grep -Ei "PROVISIONING_PROFILE|CODE_SIGN|DEVELOPMENT_TEAM|BUNDLE_IDENT" || true

      - name: Build tvOS app (.ipa)
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
