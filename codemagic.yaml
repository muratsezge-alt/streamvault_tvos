workflows:
  tvos-testflight:
    name: StreamVault tvOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    # 1) In Codemagic UI → Teams/User settings → Integrations → App Store Connect,
    #    add an API key and give it a name. Put that SAME name below.
    integrations:
      app_store_connect: StreamVaultTV_ASC_Key

    environment:
      xcode: latest
      vars:
        BUNDLE_ID: "com.murat.streamvault.tv"
        XCODE_PROJECT: "StreamVaultTV.xcodeproj"
        XCODE_SCHEME: "StreamVaultTV"
        # 2) After you create the tvOS app in App Store Connect, paste its
        #    numeric Apple ID here (App Store Connect → App → App Information → Apple ID).
        APP_STORE_APPLE_ID: 006777746035
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.murat.streamvault.tv
        provisioning_profiles:
          - StreamVault_tvOS_AppStore

    scripts:
      - name: Install XcodeGen and generate the Xcode project
        script: |
          brew install xcodegen
          # BUILD_NUMBER is provided automatically by Codemagic and gets baked
          # into CURRENT_PROJECT_VERSION via project.yml.
          export BUILD_NUMBER
          xcodegen generate

      - name: Set up code signing (fetch/create tvOS profiles)
        script: |
          xcode-project use-profiles

      - name: Build tvOS app (.ipa)
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Adds the build to your internal testers automatically.
        beta_groups:
          - "Internal Testers"
