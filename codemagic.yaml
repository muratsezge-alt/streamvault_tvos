workflows:
  tvos-testflight:
    name: StreamVault tvOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: Codemagic Key   # <-- çalışan anahtar adın

    environment:
      xcode: latest
      groups:
        - signing
      vars:
        BUNDLE_ID: "com.murat.streamvault.tv"
        XCODE_PROJECT: "StreamVaultTV.xcodeproj"
        XCODE_SCHEME: "StreamVaultTV"
        APP_STORE_APPLE_ID: 6777746035            # <-- gerçek Apple ID

    scripts:
      - name: Install XcodeGen and generate project
        script: |
          brew install xcodegen
          # Codemagic'in otomatik artan build numarasını CFBundleVersion'a göm.
          BN="${BUILD_NUMBER:-1}"
          echo "Setting CFBundleVersion to $BN"
          python3 - "$BN" <<'PY'
          import sys
          bn = sys.argv[1]
          s = open("project.yml").read().replace("${BUILD_NUMBER}", bn)
          open("project.yml","w").write(s)
          print("project.yml build number ->", bn)
          PY
          xcodegen generate

      - name: Set up tvOS code signing
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type TVOS_APP_STORE \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build tvOS app (.ipa)
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
