workflows:
  tvos-testflight:
    name: StreamVault tvOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: Codemagic Key   # <-- çalışan anahtar adınla aynı yap

    environment:
      xcode: latest
      groups:
        - signing                                # CERTIFICATE_PRIVATE_KEY bu grupta
      vars:
        BUNDLE_ID: "com.murat.streamvault.tv"
        XCODE_PROJECT: "StreamVaultTV.xcodeproj"
        XCODE_SCHEME: "StreamVaultTV"
        APP_STORE_APPLE_ID: 6777746035           # <-- gerçek sayısal Apple ID

    scripts:
      - name: Inject Missing Info.plist Keys
        script: |
          PLIST_PATH="Resources/Info.plist"
          mkdir -p $(dirname "$PLIST_PATH")
          if [ ! -f "$PLIST_PATH" ]; then
            echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict></dict></plist>' > "$PLIST_PATH"
          fi
          plutil -replace CFBundleIcons -xml '<dict><key>CFBundlePrimaryIcon</key><string>App Icon &amp; Top Shelf Image</string></dict>' "$PLIST_PATH"
          plutil -replace TVTopShelfImage -xml '<dict><key>TVTopShelfPrimaryImageWide</key><string>App Icon &amp; Top Shelf Image</string></dict>' "$PLIST_PATH"

      - name: Set up tvOS code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type TVOS_APP_STORE \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build tvOS app (.ipa)
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
