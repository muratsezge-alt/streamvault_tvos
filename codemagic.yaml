workflows:
  tvos-testflight:
    name: StreamVault tvOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    # Codemagic UI → Integrations → App Store Connect içinde eklediğin
    # API anahtarının ADI ile birebir aynı olmalı.
    integrations:
      app_store_connect: StreamVaultTV_ASC_Key

    environment:
      xcode: latest
      vars:
        BUNDLE_ID: "com.murat.streamvault.tv"
        XCODE_PROJECT: "StreamVaultTV.xcodeproj"
        XCODE_SCHEME: "StreamVaultTV"
        # App Store Connect → App → App Information → Apple ID (sayısal)
        APP_STORE_APPLE_ID: 6777746035

    scripts:
      - name: Install XcodeGen and generate the Xcode project
        script: |
          brew install xcodegen
          export BUILD_NUMBER
          xcodegen generate

      - name: Set up tvOS code signing
        script: |
          keychain initialize
          # ÖNEMLİ: platform TV_OS + type TVOS_APP_STORE + --create
          # (sertifika/profil yoksa otomatik oluşturur)
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform TV_OS \
            --type TVOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build tvOS app (.ipa)
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"