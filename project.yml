name: StreamVaultTV
options:
  bundleIdPrefix: com.murat.streamvault
  createIntermediateGroups: true
  deploymentTarget:
    tvOS: "17.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "${BUILD_NUMBER}"
    SWIFT_VERSION: "5.0"

targets:
  StreamVaultTV:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    resources:
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.murat.streamvault.tv
        TARGETED_DEVICE_FAMILY: "3"
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        GENERATE_INFOPLIST_FILE: "YES"
        DEVELOPMENT_TEAM: SGT92DDF82
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        INFOPLIST_KEY_CFBundleIcons_CFBundlePrimaryIcon: "App Icon & Top Shelf Image"
        INFOPLIST_KEY_TVTopShelfImage_TVTopShelfPrimaryImageWide: "App Icon & Top Shelf Image"
        INFOPLIST_KEY_CFBundleDisplayName: "StreamVault"
        INFOPLIST_KEY_UIUserInterfaceStyle: "Dark"
        INFOPLIST_KEY_NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true